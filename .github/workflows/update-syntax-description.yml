name: Update syntax-description

on:
  schedule:
    - cron: "0 7 * * 1" # Run every Monday at 7am UTC
    #        | | | | |
    #        | | | | day of the week (0-6) (Sunday to Saturday)
    #        | | | month (1-12)
    #        | | day of the month (1-31)
    #        | hour (0-23)
    #        minute (0-59)
  workflow_dispatch: # Enables manual trigger

jobs:
  update_syntax_desc:
    name: Update syntax-description
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checks-out repository
        uses: actions/checkout@v4
        with:
          ref: "main"
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install cf-remote
      - name: Install cfengine
        run: |
          cf-remote --version master download --edition enterprise ubuntu24 amd64 hub
          sudo dpkg -i ~/.cfengine/cf-remote/packages/cfengine-nova-hub*.deb
      - name: Extract new syntax-description
        run: |
          printf "NEW_SYNTAX_DESCRIPTION<<EOF\n%s\nEOF\n" "$(sudo cf-promises --syntax-description json)" >> $GITHUB_ENV
      - name: Get old syntax-description
        run: |
          printf "OLD_SYNTAX_DESCRIPTION<<EOF\n%s\nEOF\n" "$(cat ./cfengine-community/syntax-description.json)" >> $GITHUB_ENV
      - name: Set Git user
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
      - name: Update contents of syntax-description
        if: env.OLD_SYNTAX_DESCRIPTION != env.NEW_SYNTAX_DESCRIPTION
        run: |
          echo "$env.OLD_SYNTAX_DESCRIPTION" > ./cfengine-community/syntax-description.json
      - name: Create Pull Request
        if: env.OLD_SYNTAX_DESCRIPTION != env.NEW_SYNTAX_DESCRIPTION
        uses: cfengine/create-pull-request@v6
        with:
          title: Updated syntax-description.json
          body: Automated update to syntax-description.json [the `update-syntax-description` workflow](https://github.com/cfengine/release-information/blob/master/.github/workflows/update-syntax-description.yml).
          reviewers: |
            simonthalvorsen
          branch: update-syntax-description
          branch-suffix: timestamp
